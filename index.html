<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday - Monochrome</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #000000, #333333);
            color: #fff;
            overflow-x: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px 30px;
            max-width: 600px;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin: 20px 0;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            color: #ffffff;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
            margin-bottom: 15px;
        }

        p {
            font-size: 1.2rem;
            color: #f5f5f5;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        button {
            background-color: #ffffff;
            border: none;
            padding: 10px 20px;
            color: #000;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0px 6px 10px rgba(255, 255, 255, 0.2);
        }

        button:hover {
            background-color: #ccc;
        }

        video {
            width: 100%;
            border-radius: 15px;
            border: 4px solid #ffffff;
            margin-top: 20px;
            display: none;
        }

        .message {
            display: none;
            margin: 20px 0;
            font-size: 1.5rem;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 6px 10px rgba(0, 0, 0, 0.5);
        }

        /* Floating Effects */
        .effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .effect {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #fff, transparent);
            animation: floatEffect 6s infinite ease-in-out;
            border-radius: 50%;
            mix-blend-mode: screen;
        }

        @keyframes floatEffect {
            0% {
                transform: translateY(100vh) scale(0.8);
                opacity: 1;
            }
            50% {
                transform: translateY(50vh) scale(1);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10px) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Effects Layer -->
    <div class="effects">
        <!-- เพิ่มเอฟเฟกต์ -->
        <div class="effect" style="left: 5%; animation-delay: 0s;"></div>
        <div class="effect" style="left: 20%; animation-delay: 1s;"></div>
        <div class="effect" style="left: 35%; animation-delay: 0.5s;"></div>
        <div class="effect" style="left: 50%; animation-delay: 1.2s;"></div>
        <div class="effect" style="left: 65%; animation-delay: 0.8s;"></div>
        <div class="effect" style="left: 80%; animation-delay: 1.5s;"></div>
        <div class="effect" style="left: 90%; animation-delay: 1s;"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <h1>Happy Birthday!</h1>
        <p>ขอให้หาเงินได้เยอะๆนะ รักนะ</p>

        <!-- Button Group -->
        <div class="button-group">
            <!-- Video 1 -->
            <button onclick="showVideo('video1')">กดเลยค่อยๆนะ</button>
            <video id="video1" controls>
                <source src="video1.mp4" type="video/mp4">
            </video>
            <button onclick="showMessage('message1')">ข้อความให้อ่านเล่นๆ</button>
            <div id="message1" class="message">
                รักแกนะ มากๆด้วย ถึงแกจะรู้อยู่แล้วแต่ก็ยังรัก ปีนี้ไม่ค่อยมีอะไรให้ แต่ก็อยากให้ แบบคนปกติไม่ทำกัน แกต้องชอบ! บังคับ!
            </div>

            <!-- Video 2 -->
            <button onclick="showVideo('video2')">บอกรักเอาฟิลเฉยๆอะ</button>
            <video id="video2" controls>
                <source src="video2.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
          <!-- Video 3 -->
            <button onclick="showVideo('video3')">ในใจทั้งนั้นอะ</button>
            <video id="video3" controls>
                <source src="video3.mp4" type="video/mp4">
                
            </video>
            <button onclick="showMessage('message2')">กดดูเอาเองไม่พูดเยอะ</button>
            <div id="message2" class="message">
               มองหน้าสิมีไรให้ด้วย
            </div>
        </div>
    </div>

    <script>
        function showVideo(videoId) {
            document.getElementById(videoId).style.display = 'block';
        }

        function showMessage(messageId) {
            document.getElementById(messageId).style.display = 'block';
        }
    </script>
</body>
</html>
