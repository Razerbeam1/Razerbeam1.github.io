<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }

        @keyframes pop-in {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffc1e3, #ff9aec);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 182, 193, 0.9);
            border-radius: 20px;
            padding: 20px 30px;
            max-width: 600px;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: pop-in 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            color: #ff69b4;
            margin-bottom: 15px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
            animation: float 2s infinite;
        }

        p {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
        }

        video {
            width: 100%;
            border-radius: 15px;
            border: 4px solid #ff69b4;
            box-shadow: 0px 6px 10px rgba(0, 0, 0, 0.15);
        }

        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #fff;
            opacity: 0.8;
        }

        .balloons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            width: 50px;
            height: 70px;
            background: radial-gradient(circle at 50% 50%, #ff69b4, #ff1493);
            border-radius: 50%;
            animation: float 5s infinite;
        }

        .balloon:nth-child(2) {
            left: 20%;
            animation-duration: 6s;
        }

        .balloon:nth-child(3) {
            left: 40%;
            animation-duration: 7s;
        }

        .balloon:nth-child(4) {
            left: 60%;
            animation-duration: 5.5s;
        }

        .balloon:nth-child(5) {
            left: 80%;
            animation-duration: 6.5s;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="balloons">
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
    </div>
    <div class="container">
        <h1>Happy Birthday!</h1>
        <p>สุขสันต์วันเกิด ขอให้มีสุขภาพแข็งแรง มีความสุขมากๆ และทุกอย่างสมหวัง</p>
        <video controls>
            <source src="happy_birthday.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <footer>❤️ Just for you!</footer>
    </div>
</body>
</html>
