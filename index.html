<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffc1e3, #ff9aec);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* ป้องกันการเลื่อนแนวนอน */
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 182, 193, 0.9);
            border-radius: 20px;
            padding: 20px 30px;
            max-width: 600px;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin: 50px 0; /* เพิ่มระยะห่างจากด้านบนและล่าง */
        }

        h1 {
            font-size: 3rem;
            color: #ff69b4;
            margin-bottom: 15px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        p {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
        }

        video {
            width: 100%;
            border-radius: 15px;
            border: 4px solid #ff69b4;
            box-shadow: 0px 6px 10px rgba(0, 0, 0, 0.15);
        }

        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #fff;
            opacity: 0.8;
        }

        /* Floating hearts */
        .hearts {
            position: fixed; /* เปลี่ยนจาก absolute เป็น fixed */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff69b4;
            clip-path: polygon(50% 0%, 100% 30%, 85% 100%, 50% 85%, 15% 100%, 0% 30%);
            opacity: 0.8;
            animation: float 5s infinite ease-in-out;
        }

        @keyframes float {
            0% {
                transform: scale(0.8) translateY(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: scale(1) translateY(-50px) rotate(15deg);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.2) translateY(-150px) rotate(-15deg);
                opacity: 0;
            }
        }

        /* Random positions for hearts */
        .heart:nth-child(2) { left: 20%; animation-delay: 1s; animation-duration: 4s; }
        .heart:nth-child(3) { left: 40%; animation-delay: 2s; animation-duration: 6s; }
        .heart:nth-child(4) { left: 60%; animation-delay: 1.5s; animation-duration: 5s; }
        .heart:nth-child(5) { left: 80%; animation-delay: 0.5s; animation-duration: 3.5s; }
        .heart:nth-child(6) { left: 10%; animation-delay: 2.5s; animation-duration: 6.5s; }
    </style>
</head>
<body>
    <div class="hearts">
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
    </div>
    <div class="container">
        <h1>Happy Birthday!</h1>
        <p>สุขสันต์วันเกิด ขอให้มีสุขภาพแข็งแรง มีความสุขมากๆ และทุกอย่างสมหวัง</p>
        <video controls>
            <source src="happy_birthday.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <footer>❤️ Just for you!</footer>
    </div>
    <div class="container">
        <h1>รักเว้ยไออ้วนนนนนน</h1>
        <p>รักฉันไปนานๆหละอย่ารีบหาผัวใหม่</p>
    </div>
</body>
</html>
