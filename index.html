<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffc1e3, #ff9aec);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 182, 193, 0.9);
            border-radius: 20px;
            padding: 20px 30px;
            max-width: 600px;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #ff69b4;
            margin-bottom: 15px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        p {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
        }

        video {
            width: 100%;
            border-radius: 15px;
            border: 4px solid #ff69b4;
            box-shadow: 0px 6px 10px rgba(0, 0, 0, 0.15);
        }

        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #fff;
            opacity: 0.8;
        }

        /* Firework styles */
        .fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            background: radial-gradient(circle, #fff, transparent);
            border-radius: 50%;
            animation: explode 1.5s ease-out infinite;
        }

        @keyframes explode {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        .firework:nth-child(2) {
            left: 20%;
            top: 30%;
            animation-delay: 0.5s;
        }

        .firework:nth-child(3) {
            left: 50%;
            top: 10%;
            animation-delay: 1s;
        }

        .firework:nth-child(4) {
            left: 70%;
            top: 40%;
            animation-delay: 1.2s;
        }

        .firework:nth-child(5) {
            left: 30%;
            top: 60%;
            animation-delay: 1.4s;
        }
    </style>
</head>
<body>
    <div class="fireworks">
        <div class="firework"></div>
        <div class="firework"></div>
        <div class="firework"></div>
        <div class="firework"></div>
        <div class="firework"></div>
    </div>
    <div class="container">
        <h1>Happy Birthday!</h1>
        <p>สุขสันต์วันเกิด ขอให้มีสุขภาพแข็งแรง มีความสุขมากๆ และทุกอย่างสมหวัง</p>
        <video controls>
            <source src="happy_birthday.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <footer>❤️ Just for you!</footer>
    </div>
</body>
</html>
